server:
  port: 8083

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/insurance_db
    username: postgres
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  info:
    env:
      enabled: true

info:
  app:
    name: Claims Service
    version: 1.0.0
